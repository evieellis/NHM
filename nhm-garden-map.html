<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHM Wildlife Garden — Interactive Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #162016;
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px 36px;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }
    .header h1 {
      color: #dff0d0;
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .header p {
      color: #5e8e52;
      font-size: 0.75rem;
      letter-spacing: 3px;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .map-wrapper {
      position: relative;
      width: min(960px, 100vw - 32px);
    }

    #garden-svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 4px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
      cursor: crosshair;
      user-select: none;
    }

    /* ── Info card ── */
    .info-card {
      position: absolute;
      background: rgba(255, 253, 248, 0.97);
      border-left: 4px solid #3a7030;
      border-radius: 0 8px 8px 0;
      padding: 11px 15px 13px;
      width: 196px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.3);
      z-index: 30;
      opacity: 0;
      transform: scale(0.9) translateY(-6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }
    .info-card.show {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .info-card .tag {
      display: inline-block;
      font-size: 0.63rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
      font-family: 'Arial', sans-serif;
    }
    .tag-underground { background: #ede0d0; color: #5a3a18; border-left-color: #7a5030; }
    .tag-acoustics   { background: #d8eee8; color: #184a40; }
    .tag-aquatic     { background: #d8ecf8; color: #1a4868; }
    .tag-woodland    { background: #daecd8; color: #2a5222; }
    .tag-meadow      { background: #eaf0d0; color: #3a5818; }

    .info-card.underground { border-left-color: #7a5030; }
    .info-card.acoustics   { border-left-color: #1a7060; }
    .info-card.aquatic     { border-left-color: #1a5878; }
    .info-card.woodland    { border-left-color: #2e6028; }
    .info-card.meadow      { border-left-color: #4a7030; }

    .info-card h3 {
      font-size: 0.8rem;
      font-weight: bold;
      color: #1e301e;
      margin-bottom: 5px;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .info-card p {
      font-size: 0.74rem;
      color: #484848;
      line-height: 1.5;
      font-family: 'Arial', sans-serif;
    }
    .info-card .close-btn {
      position: absolute;
      top: 7px; right: 9px;
      background: none; border: none;
      font-size: 0.88rem; color: #aaa;
      cursor: pointer; line-height: 1; padding: 1px 3px;
    }
    .info-card .close-btn:hover { color: #555; }

    /* ── Bottom bar ── */
    .bottom-bar {
      margin-top: 16px;
      display: flex; flex-direction: column;
      align-items: center; gap: 9px;
    }
    .legend {
      display: flex; gap: 22px;
      flex-wrap: wrap; justify-content: center;
    }
    .legend-item {
      display: flex; align-items: center; gap: 7px;
      color: #82ae72; font-size: 0.75rem; letter-spacing: 0.5px;
      font-family: 'Arial', sans-serif;
    }
    .hint {
      color: #426836;
      font-size: 0.72rem; letter-spacing: 0.4px;
      text-align: center; font-family: 'Arial', sans-serif;
    }
  </style>
</head>

        <path d="M8,0 C3.6,0 0,4 0,8 C0,16 8,24 8,24 C8,24 16,16 16,8 C16,4 12.4,0 8,0 Z" fill="#e02828"/>
        <circle cx="8" cy="8" r="3.5" fill="white"/>

    </div>

<script>
// ── Pin interactions ──────────────────────────────────────────────────────────
const pins      = Array.from(document.querySelectorAll('.info-pin'));
const card      = document.getElementById('infoCard');
const cardTitle = document.getElementById('cardTitle');
const cardDesc  = document.getElementById('cardDesc');
const cardTag   = document.getElementById('cardTag');
const closeBtn  = document.getElementById('closeBtn');
const svg       = document.getElementById('garden-svg');
const wrapper   = document.getElementById('mapWrapper');

let activePin = null;

function getTranslate(el) {
  const m = el.getAttribute('transform').match(/translate\(([^,]+),\s*([^)]+)\)/);
  return { x: parseFloat(m[1]), y: parseFloat(m[2]) };
}

function svgToScreen(vbX, vbY) {
  const sr = svg.getBoundingClientRect();
  const wr = wrapper.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  return {
    x: (sr.left - wr.left) + vbX * (sr.width  / vb.width),
    y: (sr.top  - wr.top)  + vbY * (sr.height / vb.height)
  };
}

function positionCard(pin) {
  const { x: vbX, y: vbY } = getTranslate(pin);
  const { x, y } = svgToScreen(vbX, vbY + 32);
  const cw = 198;
  let left = x - cw / 2;
  let top  = y + 6;
  left = Math.max(4, Math.min(wrapper.offsetWidth - cw - 4, left));
  // flip above if card would overflow bottom
  if (top + 170 > wrapper.offsetHeight) {
    top = svgToScreen(vbX, vbY).y - 175;
  }
  card.style.left = left + 'px';
  card.style.top  = top  + 'px';
}

function openCard(pin) {
  activePin = pin;
  cardTitle.textContent = pin.dataset.title;
  cardDesc.textContent  = pin.dataset.desc;
  cardTag.textContent   = pin.dataset.catLabel;
  cardTag.className     = 'tag tag-' + pin.dataset.cat;
  card.className        = 'info-card show ' + pin.dataset.cat;
  positionCard(pin);
  pins.forEach(p => p.querySelector('circle').setAttribute('stroke-width', '2.5'));
  pin.querySelector('circle').setAttribute('stroke-width', '4.5');
}

function closeCard() {
  card.classList.remove('show');
  pins.forEach(p => p.querySelector('circle').setAttribute('stroke-width', '2.5'));
  activePin = null;
}

pins.forEach(pin => {
  pin.style.cursor = 'pointer';
  pin.addEventListener('click', e => {
    e.stopPropagation();
    activePin === pin ? closeCard() : openCard(pin);
  });
});

closeBtn.addEventListener('click', closeCard);
svg.addEventListener('click', e => {
  if (!e.target.closest('.info-pin') && !e.target.closest('#visitor-pin')) closeCard();
});

// ── Visitor pin drag ──────────────────────────────────────────────────────────
const vpin    = document.getElementById('visitor-pin');
const vpBody  = document.getElementById('vpin-body');
const vpRing  = document.getElementById('vpin-ring');
const vpDot   = document.getElementById('vpin-dot');
const vpShad  = document.getElementById('vpin-shadow');

let dragging  = false;
let dragStart = { px: 0, py: 0, vx: 0, vy: 0 };
let pinPos    = { x: 450, y: 500 }; // viewBox coords of pin base

function clientToVB(cx, cy) {
  const sr = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  return {
    x: (cx - sr.left) * (vb.width  / sr.width),
    y: (cy - sr.top)  * (vb.height / sr.height)
  };
}

function setVPin(x, y) {
  x = Math.max(24, Math.min(876, x));
  y = Math.max(42, Math.min(542, y));
  pinPos = { x, y };
  const ox = x - 450; // shape was centred at 450, 500
  const oy = y - 500;
  vpBody.setAttribute('transform', `translate(${ox},${oy})`);
  vpRing.setAttribute('cx', x);   vpRing.setAttribute('cy', y - 8);
  vpDot.setAttribute('cx', x);    vpDot.setAttribute('cy', y - 8);
  vpShad.setAttribute('cx', x);   vpShad.setAttribute('cy', y + 4);
}

function getEventXY(e) {
  return e.touches && e.touches.length
    ? { cx: e.touches[0].clientX, cy: e.touches[0].clientY }
    : { cx: e.clientX, cy: e.clientY };
}

vpin.addEventListener('mousedown',  startDrag);
vpin.addEventListener('touchstart', startDrag, { passive: true });

function startDrag(e) {
  dragging = true;
  const { cx, cy } = getEventXY(e);
  dragStart = { px: cx, py: cy, vx: pinPos.x, vy: pinPos.y };
  vpin.style.cursor = 'grabbing';
  e.stopPropagation();
}

document.addEventListener('mousemove', onDrag);
document.addEventListener('touchmove', onDrag, { passive: true });

function onDrag(e) {
  if (!dragging) return;
  const { cx, cy } = getEventXY(e);
  const sr = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  const dx = (cx - dragStart.px) * (vb.width  / sr.width);
  const dy = (cy - dragStart.py) * (vb.height / sr.height);
  setVPin(dragStart.vx + dx, dragStart.vy + dy);
}

document.addEventListener('mouseup',  endDrag);
document.addEventListener('touchend', endDrag);

function endDrag() {
  if (dragging) { dragging = false; vpin.style.cursor = 'grab'; }
}

// Double-click to teleport pin
svg.addEventListener('dblclick', e => {
  if (e.target.closest('.info-pin')) return;
  const { x, y } = clientToVB(e.clientX, e.clientY);
  setVPin(x, y);
});

// Touch double-tap
let lastTap = 0;
svg.addEventListener('touchend', e => {
  if (e.target.closest('.info-pin') || e.target.closest('#visitor-pin')) return;
  const now = Date.now();
  if (now - lastTap < 320) {
    const t = e.changedTouches[0];
    const { x, y } = clientToVB(t.clientX, t.clientY);
    setVPin(x, y);
  }
  lastTap = now;
});
</script>
