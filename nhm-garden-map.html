<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NHM Wildlife Garden — Interactive Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #dfd9c9;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 12px;
      color: #2f3527;
    }

    .app-shell {
      max-width: 1200px;
      margin: 0 auto;
      border: 1px solid #c9bfa8;
      border-radius: 32px;
      background: #f7f2e6;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.2);
      padding: 18px;
    }

    .header {
      text-align: center;
      margin-bottom: 14px;
    }
    .header h1 {
      color: #2a3b2c;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .header p {
      color: #6b624f;
      font-size: 0.75rem;
      letter-spacing: 2px;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .map-wrapper {
      position: relative;
      width: 100%;
    }

    #garden-svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 24px;
      border: 1px solid #d5cab3;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
      cursor: crosshair;
      user-select: none;
      background: #f4f1e7;
    }

    .map-label {
      fill: #1e241d;
      font-size: 8.5px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      font-weight: 700;
      letter-spacing: 0.15px;
      opacity: 0.88;
    }

    .map-label-bg {
      fill: rgba(242, 239, 230, 0.72);
      stroke: rgba(122, 116, 94, 0.22);
      stroke-width: 0.8;
    }

    /* ── Info card ── */
    .info-card {
      position: absolute;
      background: rgba(255, 253, 248, 0.97);
      border-left: 4px solid #3a7030;
      border-radius: 0 8px 8px 0;
      padding: 11px 15px 13px;
      width: 196px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.3);
      z-index: 30;
      opacity: 0;
      transform: scale(0.9) translateY(-6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }
    .info-card.show {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .info-card .tag {
      display: inline-block;
      font-size: 0.63rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
      font-family: 'Arial', sans-serif;
    }
    .tag-underground { background: #ede0d0; color: #5a3a18; border-left-color: #7a5030; }
    .tag-acoustics   { background: #d8eee8; color: #184a40; }
    .tag-aquatic     { background: #d8ecf8; color: #1a4868; }
    .tag-woodland    { background: #daecd8; color: #2a5222; }
    .tag-meadow      { background: #eaf0d0; color: #3a5818; }

    .info-card.underground { border-left-color: #7a5030; }
    .info-card.acoustics   { border-left-color: #1a7060; }
    .info-card.aquatic     { border-left-color: #1a5878; }
    .info-card.woodland    { border-left-color: #2e6028; }
    .info-card.meadow      { border-left-color: #4a7030; }

    .info-card h3 {
      font-size: 0.8rem;
      font-weight: bold;
      color: #1e301e;
      margin-bottom: 5px;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .info-card p {
      font-size: 0.74rem;
      color: #484848;
      line-height: 1.5;
      font-family: 'Arial', sans-serif;
    }
    .info-card .close-btn {
      position: absolute;
      top: 7px; right: 9px;
      background: none; border: none;
      font-size: 0.88rem; color: #aaa;
      cursor: pointer; line-height: 1; padding: 1px 3px;
    }
    .info-card .close-btn:hover { color: #555; }

    /* ── Bottom bar ── */
    .bottom-bar {
      margin-top: 14px;
      display: flex; flex-direction: column;
      align-items: center; gap: 9px;
      border: 1px solid #d5cab3;
      background: #f7f2e8;
      border-radius: 20px;
      padding: 14px 14px 12px;
    }
    .legend {
      display: flex; gap: 22px;
      flex-wrap: wrap; justify-content: center;
    }
    .legend-item {
      display: flex; align-items: center; gap: 7px;
      color: #4a4435; font-size: 0.75rem; letter-spacing: 0.3px;
      font-family: 'Arial', sans-serif;
    }
    .hint {
      color: #6b624f;
      font-size: 0.72rem; letter-spacing: 0.4px;
      text-align: center; font-family: 'Arial', sans-serif;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid #cdbf9f;
      background: #f7f2e8;
      color: #4a4435;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 14px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      transition: background 0.16s ease;
    }

    .nav-btn:hover {
      background: #eee3ce;
    }
  </style>
</head>

    ═══════════════════════════════════════════════════════════ -->
    <g id="visitor-pin" style="cursor:default">
      <ellipse id="vpin-shadow" cx="450" cy="502" rx="9" ry="3.5" fill="rgba(0,0,0,0.22)"/>
      <path id="vpin-body"
            d="M 450,470 C 435,470 424,481 424,494 C 424,510 450,530 450,530 C 450,530 476,510 476,494 C 476,481 465,470 450,470 Z"
            fill="#e02828" stroke="white" stroke-width="2.2"/>
      <circle id="vpin-ring" cx="450" cy="492" r="9"  fill="white"/>
      <circle id="vpin-dot"  cx="450" cy="492" r="5"  fill="#e02828"/>
      <rect id="vpin-label-bg" x="462" y="478" width="70" height="20" rx="10" fill="rgba(247,242,232,0.95)" stroke="#cdbf9f" stroke-width="1"/>
      <text id="vpin-label-text" x="497" y="491" text-anchor="middle" fill="#4a4435" font-size="9" font-family="Arial" font-weight="bold">You are here</text>
    </g>

  </svg>

  <!-- ─── Info card ─── -->
  <div class="info-card" id="infoCard">
    <button class="close-btn" id="closeBtn">✕</button>
    <span class="tag" id="cardTag"></span>
    <h3 id="cardTitle"></h3>
    <p id="cardDesc"></p>
  </div>

</div><!-- .map-wrapper -->

<div class="bottom-bar">
  <div class="legend">
    <div class="legend-item">
      <svg width="16" height="16"><circle cx="8" cy="8" r="7" fill="#3a6820" stroke="white" stroke-width="1.8"/></svg>
      Nature information point
    </div>
    <div class="legend-item">
      <svg width="16" height="24" viewBox="0 0 16 24">
        <path d="M8,0 C3.6,0 0,4 0,8 C0,16 8,24 8,24 C8,24 16,16 16,8 C16,4 12.4,0 8,0 Z" fill="#e02828"/>
        <circle cx="8" cy="8" r="3.5" fill="white"/>
      </svg>
      You are here
    </div>
  </div>
  <p class="hint">Tap a pin to explore the garden &nbsp;·&nbsp; Tap the Root Networks pin to enter the underground visualization</p>
</div>

</div>

<script>
// ── Pin interactions ──────────────────────────────────────────────────────────
const pins      = Array.from(document.querySelectorAll('.info-pin'));
const card      = document.getElementById('infoCard');
const cardTitle = document.getElementById('cardTitle');
const cardDesc  = document.getElementById('cardDesc');
const cardTag   = document.getElementById('cardTag');
const closeBtn  = document.getElementById('closeBtn');
const svg       = document.getElementById('garden-svg');
const wrapper   = document.getElementById('mapWrapper');

let activePin = null;

function getTranslate(el) {
  const m = el.getAttribute('transform').match(/translate\(([^,]+),\s*([^)]+)\)/);
  return { x: parseFloat(m[1]), y: parseFloat(m[2]) };
}

function svgToScreen(vbX, vbY) {
  const sr = svg.getBoundingClientRect();
  const wr = wrapper.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  return {
    x: (sr.left - wr.left) + vbX * (sr.width  / vb.width),
    y: (sr.top  - wr.top)  + vbY * (sr.height / vb.height)
  };
}

function positionCard(pin) {
  const { x: vbX, y: vbY } = getTranslate(pin);
  const { x, y } = svgToScreen(vbX, vbY + 32);
  const cw = 198;
  let left = x - cw / 2;
  let top  = y + 6;
  left = Math.max(4, Math.min(wrapper.offsetWidth - cw - 4, left));
  // flip above if card would overflow bottom
  if (top + 170 > wrapper.offsetHeight) {
    top = svgToScreen(vbX, vbY).y - 175;
  }
  card.style.left = left + 'px';
  card.style.top  = top  + 'px';
}

function openCard(pin) {
  activePin = pin;
  cardTitle.textContent = pin.dataset.title;
  cardDesc.textContent  = pin.dataset.desc;
  cardTag.textContent   = pin.dataset.catLabel;
  cardTag.className     = 'tag tag-' + pin.dataset.cat;
  card.className        = 'info-card show ' + pin.dataset.cat;
  positionCard(pin);
  pins.forEach(p => p.querySelector('circle').setAttribute('stroke-width', '2.5'));
  pin.querySelector('circle').setAttribute('stroke-width', '4.5');
}

function closeCard() {
  card.classList.remove('show');
  pins.forEach(p => p.querySelector('circle').setAttribute('stroke-width', '2.5'));
  activePin = null;
}

pins.forEach(pin => {
  pin.style.cursor = 'pointer';
  pin.addEventListener('click', e => {
    e.stopPropagation();
    if (pin.id === 'pin-0') {
      window.location.href = './worm-local.html?step=1';
      return;
    }
    if (pin.id === 'pin-1') {
      window.location.href = 'https://www.figma.com/proto/YFhVKiLxStkrIphFMRV9JT/Bottom-Screen-Wireframes?node-id=200-562&t=vzuLRWx2VVkdQmsY-1&starting-point-node-id=195%3A183';
      return;
    }
    activePin === pin ? closeCard() : openCard(pin);
  });
});

closeBtn.addEventListener('click', closeCard);
svg.addEventListener('click', e => {
  if (!e.target.closest('.info-pin') && !e.target.closest('#visitor-pin')) closeCard();
});

// ── Visitor pin remains fixed ─────────────────────────────────────────────────
const vpin    = document.getElementById('visitor-pin');
const vpBody  = document.getElementById('vpin-body');
const vpRing  = document.getElementById('vpin-ring');
const vpDot   = document.getElementById('vpin-dot');
const vpShad  = document.getElementById('vpin-shadow');
const vpLabelBg   = document.getElementById('vpin-label-bg');
const vpLabelText = document.getElementById('vpin-label-text');
let pinPos    = { x: 450, y: 312 }; // viewBox coords of pin base (centered)

function clientToVB(cx, cy) {
  const sr = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  return {
    x: (cx - sr.left) * (vb.width  / sr.width),
    y: (cy - sr.top)  * (vb.height / sr.height)
  };
}

function setVPin(x, y) {
  x = Math.max(24, Math.min(876, x));
  y = Math.max(42, Math.min(542, y));
  pinPos = { x, y };
  const ox = x - 450; // shape was centred at 450, 500
  const oy = y - 500;
  vpBody.setAttribute('transform', `translate(${ox},${oy})`);
  vpRing.setAttribute('cx', x);   vpRing.setAttribute('cy', y - 8);
  vpDot.setAttribute('cx', x);    vpDot.setAttribute('cy', y - 8);
  vpShad.setAttribute('cx', x);   vpShad.setAttribute('cy', y + 4);
  vpLabelBg.setAttribute('x', x + 12);
  vpLabelBg.setAttribute('y', y - 22);
  vpLabelText.setAttribute('x', x + 47);
  vpLabelText.setAttribute('y', y - 9);
}

setVPin(pinPos.x, pinPos.y);
</script>
</body>
</html>
